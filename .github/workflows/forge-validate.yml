# Generated by forge-sdlc — do not edit by hand
# Stages: requirements → design → implement → validate → deploy
name: forge-validate
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  forge-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (javascript)
        run: |
          npm install

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' || hashFiles('pyproject.toml') != '' }}
        run: tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: node --test hooks/__tests__/*.test.js enterprise/*/*.test.js runtime/integration.test.js adapters/install.test.js bin/lib/*.test.js

      - name: Format check
        if: ${{ hashFiles('.prettierrc*') != '' || hashFiles('pyproject.toml') != '' }}
        run: prettier --check .

      - name: Secret scan
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true

      - name: Run forge-sdlc validator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # The validator sub-agent runs the deterministic checks listed in
          # steering/03-quality-gates.md and emits VERDICT: PASS | FAIL.
          # In CI we only run the deterministic part — the LLM-judge checks
          # are skipped because they're not reproducible in a headless env.
          node enterprise/ci/run-validator.js

      - name: Post PR status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = process.env.FORGE_VERDICT || 'UNKNOWN';
            const body = `🤖 forge-sdlc validator — ${verdict} See the job logs for details.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
